<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脉冲 (Mài Chōng) - 设计稿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 主应用容器 -->
    <div id="app-container">

        <!-- 顶部导航栏 -->
        <header id="main-header">
            <div class="header-content">
                <h1 class="timeline-title">周末家庭出游</h1>
                <div class="participants">
                    <img src="https://via.placeholder.com/30/FFC107/808080?text=A" alt="用户A" class="avatar">
                    <img src="https://via.placeholder.com/30/03A9F4/FFFFFF?text=B" alt="用户B" class="avatar">
                    <img src="https://via.placeholder.com/30/4CAF50/FFFFFF?text=C" alt="用户C" class="avatar">
                    <div class="avatar more">+2</div>
                </div>
            </div>
            <button id="share-button" class="header-button" title="分享">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3s3-1.34 3-3-1.34-3-3-3z"></path></svg>
            </button>
        </header>

        <!-- 可视化时间线 -->
        <main id="timeline">
            <!-- 时间线轴线 -->
            <div class="timeline-axis"></div>

            <!-- 时间节点 - 日期分隔 -->
            <div class="timeline-node date-separator">
                <span class="date-label">1月17日, 星期六</span>
            </div>

            <!-- 事件卡片1: 简单事件 -->
            <div class="timeline-node">
                <div class="pulse-card" id="event-1">
                    <div class="card-time">
                        <span class="time-value">10:00</span>
                        <span class="time-period">AM</span>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">出发，前往森林公园</h2>
                        <p class="card-details">从家里出发，预计车程1.5小时</p>
                    </div>
                    <div class="card-status status-confirmed"></div>
                </div>
            </div>

            <!-- 事件卡片2: 带有多人参与和评论的事件 -->
            <div class="timeline-node">
                <div class="pulse-card" id="event-2">
                    <div class="card-time">
                        <span class="time-value">12:30</span>
                        <span class="time-period">PM</span>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">公园野餐</h2>
                        <p class="card-details">地点：中央草坪。我带三明治和水果！</p>
                        <div class="card-interactions">
                            <span class="comment-count">💬 3</span>
                            <div class="interaction-avatars">
                                <img src="https://via.placeholder.com/20/03A9F4/FFFFFF?text=B" alt="用户B" class="avatar-sm">
                                <img src="https://via.placeholder.com/20/4CAF50/FFFFFF?text=C" alt="用户C" class="avatar-sm">
                            </div>
                        </div>
                    </div>
                    <div class="card-status status-confirmed"></div>
                </div>
            </div>

             <!-- 事件卡片3: 提案模式 (未来功能) -->
            <div class="timeline-node">
                <div class="pulse-card proposal" id="event-3">
                    <div class="card-time">
                        <span class="time-value">15:00</span>
                        <span class="time-period">PM</span>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">【提案】去看猴山</h2>
                        <p class="card-details">由 C 提出。需要大家投票或组织者确认。</p>
                        <div class="proposal-actions">
                            <button class="btn-approve">同意</button>
                            <button class="btn-decline">拒绝</button>
                        </div>
                    </div>
                     <div class="card-status status-proposal"></div>
                </div>
            </div>

            <!-- 时间节点 - 日期分隔 -->
            <div class="timeline-node date-separator">
                <span class="date-label">1月18日, 星期日</span>
            </div>

             <!-- 事件卡片4: 持续整天的事件 -->
             <div class="timeline-node">
                <div class="pulse-card all-day" id="event-4">
                    <div class="card-time">
                        <span class="time-value">全天</span>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">自由活动</h2>
                        <p class="card-details">可以在附近逛逛，或者在酒店休息</p>
                    </div>
                    <div class="card-status status-tentative"></div>
                </div>
            </div>

        </main>

        <!-- AI助手 悬浮按钮 -->
        <button id="ai-fab" title="唤醒AI助手">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm3-5c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"></path></svg>
            <span>脉冲</span>
        </button>

    </div>

    <!-- AI助手 对话框 (默认隐藏) -->
    <div id="ai-modal" class="hidden">
        <div id="ai-modal-content">
            <button id="close-modal-button">&times;</button>
            <div class="ai-header">
                <h2 class="ai-title">AI 脉冲助手</h2>
                <p class="ai-slogan">告诉我你的计划，剩下的交给我</p>
            </div>
            <div class="ai-chat-box">
                <!-- 示例对话 -->
                <div class="chat-message user">
                    <p>明天下午安排一个2小时的咖啡时间</p>
                </div>
                <div class="chat-message ai">
                    <p>好的，已在明天 15:00 为你安排“咖啡时间 ☕️”。需要邀请谁吗？</p>
                </div>
            </div>
            <div class="ai-input-area">
                <input type="text" id="ai-input" placeholder="例如：创建周六的晚餐计划...">
                <button id="ai-send-button">发送</button>
            </div>
        </div>
    </div>

</body>
</html>
