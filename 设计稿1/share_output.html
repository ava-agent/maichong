<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享：周末家庭出游</title>
    <link rel="stylesheet" href="share_style.css">
</head>
<body>

    <div id="share-card">
        <div class="share-header">
            <h1 class="share-title">周末家庭出游</h1>
            <p class="share-date">2026年1月17日 - 1月18日</p>
        </div>

        <div class="share-timeline">
            <!-- 第一个事件 -->
            <div class="share-event">
                <div class="event-time">10:00 AM</div>
                <div class="event-details">
                    <h2 class="event-title">出发，前往森林公园</h2>
                    <p class="event-note">从家里出发，预计车程1.5小时</p>
                </div>
            </div>

            <!-- 第二个事件 -->
            <div class="share-event">
                <div class="event-time">12:30 PM</div>
                <div class="event-details">
                    <h2 class="event-title">公园野餐</h2>
                    <p class="event-note">地点：中央草坪。我带三明治和水果！</p>
                </div>
            </div>

            <!-- 第三个事件 -->
            <div class="share-event">
                <div class="event-time">全天</div>
                <div class="event-details">
                    <h2 class="event-title">自由活动</h2>
                    <p class="event-note">可以在附近逛逛，或者在酒店休息</p>
                </div>
            </div>
        </div>

        <div class="share-footer">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"></path></svg>
                <span>脉冲 (Mài Chōng)</span>
            </div>
            <p class="slogan">同步每次脉冲。</p>
        </div>
    </div>

</body>
</html>
