<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949AB;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="pulseBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="coupleBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8BBD9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="liteBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>

    <!-- 功能模块渐变 -->
    <linearGradient id="coreFeature" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF59D;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="advancedFeature" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1C4E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadowEffect" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
    </filter>

    <!-- 箭头标记 -->
    <marker id="flowArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- 标题 -->
  <g id="header">
    <rect x="50" y="20" width="1300" height="70" rx="15" fill="url(#headerGradient)" stroke="#0D47A1" stroke-width="2"/>
    <text x="700" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="white">⚙️ 产品功能架构图 - 核心功能与用户流程</text>
  </g>

  <!-- 脉冲产品功能架构 -->
  <g id="pulse-architecture" transform="translate(50, 110)">
    <rect width="420" height="380" rx="15" fill="url(#pulseBg)" stroke="#2E7D32" stroke-width="2" filter="url(#shadowEffect)"/>
    <text x="30" y="40" fill="#1B5E20" font-size="22" font-weight="bold">💓 脉冲 (Mài Chōng)</text>
    <text x="30" y="60" fill="#2E7D32" font-size="14">AI驱动的生活节律协同助手</text>

    <!-- MVP核心功能 -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#1B5E20" font-size="16" font-weight="bold">🚀 MVP核心功能</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="20" fill="#E65100" font-size="12" font-weight="bold">📊 可视化时间线</text>
        <text x="15" y="35" fill="#E65100" font-size="10">垂直滚动时间轴</text>
        <text x="15" y="48" fill="#E65100" font-size="10">脉冲卡片展示</text>

        <rect x="200" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="215" y="20" fill="#E65100" font-size="12" font-weight="bold">🤝 实时协作</text>
        <text x="215" y="35" fill="#E65100" font-size="10">链接邀请成员</text>
        <text x="215" y="48" fill="#E65100" font-size="10">实时同步编辑</text>
      </g>

      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="180" height="40" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="15" fill="#E65100" font-size="12" font-weight="bold">🤖 AI智能助手</text>
        <text x="15" y="28" fill="#E65100" font-size="10">自然语言录入</text>

        <rect x="200" y="0" width="180" height="40" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="215" y="15" fill="#E65100" font-size="12" font-weight="bold">📸 静态分享</text>
        <text x="215" y="28" fill="#E65100" font-size="10">生成精美图片</text>
      </g>
    </g>

    <!-- 未来亮点功能 -->
    <g transform="translate(30, 240)">
      <text x="0" y="0" fill="#1B5E20" font-size="16" font-weight="bold">✨ 未来亮点功能</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="360" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="18" fill="#4A148C" font-size="12" font-weight="bold">🎯 AI智能排期 + 提案模式</text>
        <text x="15" y="33" fill="#4A148C" font-size="10">模糊需求智能推荐 + 版本控制协作</text>

        <rect x="0" y="55" width="360" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="73" fill="#4A148C" font-size="12" font-weight="bold">💕 亲密关系功能 + 动态分享</text>
        <text x="15" y="88" fill="#4A148C" font-size="10">愿望单/纪念日管家 + 故事卡片视频分享</text>
      </g>
    </g>
  </g>

  <!-- 情侣出行助手功能架构 -->
  <g id="couple-architecture" transform="translate(490, 110)">
    <rect width="420" height="380" rx="15" fill="url(#coupleBg)" stroke="#C2185B" stroke-width="2" filter="url(#shadowEffect)"/>
    <text x="30" y="40" fill="#880E4F" font-size="22" font-weight="bold">💑 情侣出行助手</text>
    <text x="30" y="60" fill="#C2185B" font-size="14">专为情侣设计的AI出行规划工具</text>

    <!-- MVP核心功能 -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#880E4F" font-size="16" font-weight="bold">🚀 MVP核心功能</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="20" fill="#E65100" font-size="12" font-weight="bold">📝 行程创建编辑</text>
        <text x="15" y="35" fill="#E65100" font-size="10">双人协作编辑</text>
        <text x="15" y="48" fill="#E65100" font-size="10">实时同步</text>

        <rect x="200" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="215" y="20" fill="#E65100" font-size="12" font-weight="bold">💕 AI浪漫建议</text>
        <text x="215" y="35" fill="#E65100" font-size="10">基于情感偏好</text>
        <text x="215" y="48" fill="#E65100" font-size="10">个性化推荐</text>
      </g>

      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="360" height="40" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="15" fill="#E65100" font-size="12" font-weight="bold">👁️ 视觉化预览</text>
        <text x="15" y="28" fill="#E65100" font-size="10">拍照点预览 + 穿搭建议 + 氛围展示</text>
      </g>
    </g>

    <!-- 商业化功能 -->
    <g transform="translate(30, 240)">
      <text x="0" y="0" fill="#880E4F" font-size="16" font-weight="bold">💰 商业化变现</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="170" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="18" fill="#4A148C" font-size="12" font-weight="bold">📱 订阅制服务</text>
        <text x="15" y="33" fill="#4A148C" font-size="10">¥9.9/月会员版</text>

        <rect x="190" y="0" width="170" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="205" y="18" fill="#4A148C" font-size="12" font-weight="bold">🤝 企业服务</text>
        <text x="205" y="33" fill="#4A148C" font-size="10">API接口定制</text>

        <rect x="0" y="55" width="360" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="73" fill="#4A148C" font-size="12" font-weight="bold">💸 广告/佣金</text>
        <text x="15" y="88" fill="#4A148C" font-size="10">特色餐厅推荐 + Affiliate营销</text>
      </g>
    </g>
  </g>

  <!-- 轻日程功能架构 -->
  <g id="lite-architecture" transform="translate(930, 110)">
    <rect width="420" height="380" rx="15" fill="url(#liteBg)" stroke="#1976D2" stroke-width="2" filter="url(#shadowEffect)"/>
    <text x="30" y="40" fill="#0D47A1" font-size="22" font-weight="bold">📅 轻日程 (LiteFlow)</text>
    <text x="30" y="60" fill="#1976D2" font-size="14">极简协作的轻量化日程规划工具</text>

    <!-- MVP核心功能 -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#0D47A1" font-size="16" font-weight="bold">🚀 MVP核心功能</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="20" fill="#E65100" font-size="12" font-weight="bold">📊 可视化时间线</text>
        <text x="15" y="35" fill="#E65100" font-size="10">无限滚动时间轴</text>
        <text x="15" y="48" fill="#E65100" font-size="10">一目了然展示</text>

        <rect x="200" y="0" width="180" height="60" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="215" y="20" fill="#E65100" font-size="12" font-weight="bold">⚡ 实时协作</text>
        <text x="215" y="35" fill="#E65100" font-size="10">链接一键邀请</text>
        <text x="215" y="48" fill="#E65100" font-size="10">毫秒级同步</text>
      </g>

      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="180" height="40" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="15" y="15" fill="#E65100" font-size="12" font-weight="bold">🎙️ AI智能录入</text>
        <text x="15" y="28" fill="#E65100" font-size="10">语音文字输入</text>

        <rect x="200" y="0" width="180" height="40" rx="8" fill="url(#coreFeature)" stroke="#F57F17" stroke-width="1"/>
        <text x="215" y="15" fill="#E65100" font-size="12" font-weight="bold">📋 场景模板</text>
        <text x="215" y="28" fill="#E65100" font-size="10">旅行/会议/购物等</text>
      </g>
    </g>

    <!-- 商业化功能 -->
    <g transform="translate(30, 240)">
      <text x="0" y="0" fill="#0D47A1" font-size="16" font-weight="bold">💰 商业化变现</text>

      <g transform="translate(0, 20)">
        <rect x="0" y="0" width="360" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="18" fill="#4A148C" font-size="12" font-weight="bold">💎 Freemium订阅制</text>
        <text x="15" y="33" fill="#4A148C" font-size="10">¥9.9/月Pro版：无限时间线 + 高级AI + 更多协作者</text>

        <rect x="0" y="55" width="360" height="45" rx="8" fill="url(#advancedFeature)" stroke="#7B1FA2" stroke-width="1"/>
        <text x="15" y="73" fill="#4A148C" font-size="12" font-weight="bold">🎨 个性化扩展</text>
        <text x="15" y="88" fill="#4A148C" font-size="10">更多主题 + 高级模板 + 团队功能</text>
      </g>
    </g>
  </g>

  <!-- 用户流程图 -->
  <g id="user-flow" transform="translate(50, 520)">
    <rect width="1300" height="200" rx="15" fill="#F8F9FA" stroke="#6C757D" stroke-width="2"/>
    <text x="30" y="30" fill="#343A40" font-size="20" font-weight="bold">🔄 典型用户流程</text>

    <!-- 用户旅程步骤 -->
    <g transform="translate(50, 50)">
      <!-- 步骤1 -->
      <circle cx="50" cy="50" r="30" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
      <text x="50" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1</text>
      <text x="90" y="45" fill="#2E7D32" font-size="13" font-weight="bold">发现需求</text>
      <text x="90" y="60" fill="#666" font-size="11">周末聚会/旅行规划</text>

      <!-- 箭头 -->
      <path d="M 120 50 L 160 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤2 -->
      <circle cx="190" cy="50" r="30" fill="#2196F3" stroke="#0D47A1" stroke-width="2"/>
      <text x="190" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">2</text>
      <text x="230" y="45" fill="#0D47A1" font-size="13" font-weight="bold">选择产品</text>
      <text x="230" y="60" fill="#666" font-size="11">根据场景选择工具</text>

      <!-- 箭头 -->
      <path d="M 260 50 L 300 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤3 -->
      <circle cx="330" cy="50" r="30" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
      <text x="330" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">3</text>
      <text x="370" y="45" fill="#E65100" font-size="13" font-weight="bold">邀请协作</text>
      <text x="370" y="60" fill="#666" font-size="11">链接分享给伙伴</text>

      <!-- 箭头 -->
      <path d="M 400 50 L 440 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤4 -->
      <circle cx="470" cy="50" r="30" fill="#9C27B0" stroke="#4A148C" stroke-width="2"/>
      <text x="470" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">4</text>
      <text x="510" y="45" fill="#4A148C" font-size="13" font-weight="bold">AI辅助规划</text>
      <text x="510" y="60" fill="#666" font-size="11">智能建议和优化</text>

      <!-- 箭头 -->
      <path d="M 540 50 L 580 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤5 -->
      <circle cx="610" cy="50" r="30" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
      <text x="610" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">5</text>
      <text x="650" y="45" fill="#2E7D32" font-size="13" font-weight="bold">实时协作</text>
      <text x="650" y="60" fill="#666" font-size="11">同步编辑和调整</text>

      <!-- 箭头 -->
      <path d="M 680 50 L 720 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤6 -->
      <circle cx="750" cy="50" r="30" fill="#FF5722" stroke="#BF360C" stroke-width="2"/>
      <text x="750" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">6</text>
      <text x="790" y="45" fill="#BF360C" font-size="13" font-weight="bold">分享成果</text>
      <text x="790" y="60" fill="#666" font-size="11">生成精美分享内容</text>

      <!-- 箭头 -->
      <path d="M 820 50 L 860 50" stroke="#666" stroke-width="2" marker-end="url(#flowArrow)"/>

      <!-- 步骤7 -->
      <circle cx="890" cy="50" r="30" fill="#607D8B" stroke="#37474F" stroke-width="2"/>
      <text x="890" y="56" text-anchor="middle" fill="white" font-size="14" font-weight="bold">7</text>
      <text x="930" y="45" fill="#37474F" font-size="13" font-weight="bold">持续使用</text>
      <text x="930" y="60" fill="#666" font-size="11">建立使用习惯</text>
    </g>

    <!-- 产品选择逻辑 -->
    <g transform="translate(50, 120)">
      <text x="0" y="0" fill="#666" font-size="12" font-weight="bold">产品选择逻辑：</text>
      <text x="0" y="20" fill="#666" font-size="11">• 复杂生活规划 → 脉冲 (全功能)</text>
      <text x="0" y="35" fill="#666" font-size="11">• 情侣浪漫出行 → 情侣助手 (垂直深耕)</text>
      <text x="0" y="50" fill="#666" font-size="11">• 简单团队协作 → 轻日程 (极简高效)</text>
    </g>
  </g>

  <!-- 技术共用说明 -->
  <g id="tech-sharing" transform="translate(50, 750)">
    <rect width="600" height="80" rx="10" fill="#E8F5E8" stroke="#2E7D32" stroke-width="1"/>
    <text x="20" y="25" fill="#1B5E20" font-size="16" font-weight="bold">🔧 技术共用优势：</text>
    <text x="20" y="45" fill="#2E7D32" font-size="13">• Flutter跨平台开发，降低80%重复开发成本</text>
    <text x="20" y="60" fill="#2E7D32" font-size="13">• Supabase统一后端，共享用户数据和实时协作能力</text>
    <text x="20" y="75" fill="#2E7D32" font-size="13">• AI API接口复用，快速推出新产品特性</text>
  </g>

  <!-- 发展策略 -->
  <g id="strategy" transform="translate(680, 750)">
    <rect width="670" height="80" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
    <text x="20" y="25" fill="#E65100" font-size="16" font-weight="bold">🎯 产品发展策略：</text>
    <text x="20" y="45" fill="#E65100" font-size="13">• MVP优先：轻日程和情侣助手快速上线验证市场</text>
    <text x="20" y="60" fill="#E65100" font-size="13">• 脉冲旗舰：整合三产品优势，成为完整解决方案</text>
    <text x="20" y="75" fill="#E65100" font-size="13">• 渐进迭代：从垂直场景扩展到通用协作平台</text>
  </g>
</svg>