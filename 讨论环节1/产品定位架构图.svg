<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949AB;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="coupleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8BBD9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="liteGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadowEffect" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1" />
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#666" />
    </marker>
  </defs>

  <!-- 标题区域 -->
  <g id="header">
    <rect x="50" y="20" width="1100" height="80" rx="15" fill="url(#headerGradient)" stroke="#0D47A1" stroke-width="2"/>
    <text x="600" y="70" text-anchor="middle" font-size="32" font-weight="bold" fill="white">🔍 脉冲产品家族 - 定位架构图</text>
  </g>

  <!-- 核心技术基础 -->
  <g id="core-foundation" transform="translate(50, 120)">
    <rect width="1100" height="120" rx="15" fill="url(#coreGradient)" stroke="#F57C00" stroke-width="2" filter="url(#shadowEffect)"/>
    <text x="60" y="50" fill="#E65100" font-size="24" font-weight="bold">🏗️ 核心技术基础</text>

    <g transform="translate(60, 70)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
      <text x="90" y="22" text-anchor="middle" fill="#E65100" font-size="14">Flutter 跨平台</text>

      <rect x="200" y="0" width="180" height="35" rx="8" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
      <text x="290" y="22" text-anchor="middle" fill="#E65100" font-size="14">Supabase 实时同步</text>

      <rect x="400" y="0" width="180" height="35" rx="8" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
      <text x="490" y="22" text-anchor="middle" fill="#E65100" font-size="14">AI API 智能驱动</text>

      <rect x="600" y="0" width="180" height="35" rx="8" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
      <text x="690" y="22" text-anchor="middle" fill="#E65100" font-size="14">Freemium 商业模式</text>

      <rect x="800" y="0" width="180" height="35" rx="8" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
      <text x="890" y="22" text-anchor="middle" fill="#E65100" font-size="14">18-35岁 目标用户</text>
    </g>
  </g>

  <!-- 产品定位区域 -->
  <g id="products" transform="translate(50, 260)">

    <!-- 脉冲产品 -->
    <g id="pulse-product" transform="translate(0, 0)">
      <rect width="360" height="200" rx="15" fill="url(#pulseGradient)" stroke="#2E7D32" stroke-width="2" filter="url(#shadowEffect)"/>
      <text x="30" y="40" fill="#1B5E20" font-size="20" font-weight="bold">💓 脉冲 (Mài Chōng)</text>

      <text x="30" y="70" fill="#2E7D32" font-size="14" font-weight="bold">核心定位：</text>
      <text x="30" y="90" fill="#388E3C" font-size="13">AI驱动的生活节律协同助手</text>

      <text x="30" y="120" fill="#2E7D32" font-size="14" font-weight="bold">核心特色：</text>
      <text x="30" y="140" fill="#388E3C" font-size="12">• 可视化时间线 + 实时协作</text>
      <text x="30" y="155" fill="#388E3C" font-size="12">• 智能排期 + 多协作模式</text>
      <text x="30" y="170" fill="#388E3C" font-size="12">• 亲密关系专属功能</text>

      <text x="30" y="190" fill="#1B5E20" font-size="12" font-weight="bold">🎯 全场景生活规划</text>
    </g>

    <!-- 情侣出行助手 -->
    <g id="couple-product" transform="translate(410, 0)">
      <rect width="360" height="200" rx="15" fill="url(#coupleGradient)" stroke="#C2185B" stroke-width="2" filter="url(#shadowEffect)"/>
      <text x="30" y="40" fill="#880E4F" font-size="20" font-weight="bold">💑 情侣出行助手</text>

      <text x="30" y="70" fill="#C2185B" font-size="14" font-weight="bold">核心定位：</text>
      <text x="30" y="90" fill="#AD1457" font-size="13">专为情侣设计的AI出行规划工具</text>

      <text x="30" y="120" fill="#C2185B" font-size="14" font-weight="bold">核心特色：</text>
      <text x="30" y="140" fill="#AD1457" font-size="12">• 双人协作 + 情感化AI</text>
      <text x="30" y="155" fill="#AD1457" font-size="12">• 浪漫场景推荐</text>
      <text x="30" y="170" fill="#AD1457" font-size="12">• 视觉化预览体验</text>

      <text x="30" y="190" fill="#880E4F" font-size="12" font-weight="bold">💕 专注浪漫出行体验</text>
    </g>

    <!-- 轻日程 -->
    <g id="lite-product" transform="translate(820, 0)">
      <rect width="360" height="200" rx="15" fill="url(#liteGradient)" stroke="#1976D2" stroke-width="2" filter="url(#shadowEffect)"/>
      <text x="30" y="40" fill="#0D47A1" font-size="20" font-weight="bold">📅 轻日程 (LiteFlow)</text>

      <text x="30" y="70" fill="#1976D2" font-size="14" font-weight="bold">核心定位：</text>
      <text x="30" y="90" fill="#1565C0" font-size="13">极简协作的轻量化日程规划工具</text>

      <text x="30" y="120" fill="#1976D2" font-size="14" font-weight="bold">核心特色：</text>
      <text x="30" y="140" fill="#1565C0" font-size="12">• 极致简洁时间线</text>
      <text x="30" y="155" fill="#1565C0" font-size="12">• 实时无缝协作</text>
      <text x="30" y="170" fill="#1565C0" font-size="12">• AI智能录入</text>

      <text x="30" y="190" fill="#0D47A1" font-size="12" font-weight="bold">⚡ 简单高效的团队协作</text>
    </g>
  </g>

  <!-- 产品关系连接线 -->
  <g id="relationships">
    <!-- 核心技术到产品的连接 -->
    <path d="M 600 240 L 600 260" stroke="#F57C00" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

    <!-- 产品间的协同关系 -->
    <path d="M 360 360 L 410 360" stroke="#666" stroke-width="2"/>
    <text x="385" y="355" text-anchor="middle" fill="#666" font-size="12">功能互补</text>

    <path d="M 770 360 L 820 360" stroke="#666" stroke-width="2"/>
    <text x="795" y="355" text-anchor="middle" fill="#666" font-size="12">技术共用</text>

    <!-- 市场定位关系 -->
    <path d="M 180 460 L 230 480" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 1020 460 L 970 480" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- 市场定位对比 -->
  <g id="market-positioning" transform="translate(50, 480)">
    <rect width="1100" height="120" rx="15" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
    <text x="60" y="40" fill="#424242" font-size="20" font-weight="bold">📊 市场定位对比</text>

    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="200" height="40" rx="8" fill="#E8F5E8" stroke="#2E7D32" stroke-width="1"/>
      <text x="100" y="25" text-anchor="middle" fill="#1B5E20" font-size="12">脉冲：全场景覆盖</text>

      <rect x="250" y="0" width="200" height="40" rx="8" fill="#FCE4EC" stroke="#C2185B" stroke-width="1"/>
      <text x="350" y="25" text-anchor="middle" fill="#880E4F" font-size="12">情侣助手：垂直深耕</text>

      <rect x="500" y="0" width="200" height="40" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
      <text x="600" y="25" text-anchor="middle" fill="#0D47A1" font-size="12">轻日程：轻量通用</text>

      <rect x="750" y="0" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
      <text x="850" y="25" text-anchor="middle" fill="#E65100" font-size="12">共用技术栈</text>
    </g>
  </g>

  <!-- 图例 -->
  <g id="legend" transform="translate(50, 620)">
    <rect width="400" height="100" rx="10" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
    <text x="20" y="30" fill="#424242" font-size="14" font-weight="bold">图例说明:</text>

    <g transform="translate(20, 40)">
      <line x1="0" y1="10" x2="30" y2="10" stroke="#F57C00" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="40" y="15" fill="#666" font-size="12">技术依赖关系</text>

      <line x1="0" y1="35" x2="30" y2="35" stroke="#666" stroke-width="2"/>
      <text x="40" y="40" fill="#666" font-size="12">产品协同关系</text>

      <circle cx="15" cy="55" r="8" fill="#E8F5E8" stroke="#2E7D32" stroke-width="1"/>
      <text x="40" y="60" fill="#666" font-size="12">差异化定位</text>
    </g>
  </g>

  <!-- 总结洞察 -->
  <g id="insights" transform="translate(500, 620)">
    <rect width="650" height="100" rx="10" fill="#E8F5E8" stroke="#2E7D32" stroke-width="1"/>
    <text x="30" y="30" fill="#1B5E20" font-size="16" font-weight="bold">💡 核心洞察：</text>

    <text x="30" y="50" fill="#2E7D32" font-size="13">• 三个产品形成完整的AI协作工具矩阵</text>
    <text x="30" y="65" fill="#2E7D32" font-size="13">• 脉冲作为旗舰产品，覆盖全场景需求</text>
    <text x="30" y="80" fill="#2E7D32" font-size="13">• 垂直产品聚焦特定场景，快速验证市场</text>
    <text x="30" y="95" fill="#2E7D32" font-size="13">• 共用技术栈降低开发成本，提高迭代效率</text>
  </g>
</svg>