<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>脉冲 (Mài Chōng) - 交互稿 v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 主应用容器，用于控制视图切换 -->
    <div id="app-container">

        <!-- 视图1: AI聊天视图 (Doubao风格) -->
        <div id="chat-view" class="view">
            <header class="view-header">
                <h1 class="view-title">与 AI 脉冲助手对话</h1>
                <button id="view-timeline-btn" class="header-button" title="查看时间线">
                    <!-- Icon for timeline -->
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M140-100v-30q0-13 8.5-21.5T170-160h40v-100h-40q-29 0-49.5-20.5T100-330v-300q0-29 20.5-49.5T170-700h40v-100h40q13 0 21.5-8.5T280-830v-30h400v30q0 13-8.5 21.5T650-800h-40v100h40q29 0 49.5 20.5T780-630v300q0 29-20.5 49.5T710-260h-40v100h40q13 0 21.5 8.5T740-130v30H140Zm60-60h40v-100h-40q-13 0-21.5-8.5T210-300v-360q0-13 8.5-21.5T240-690h40v-100h360v100h40q13 0 21.5 8.5T710-660v360q0 13-8.5 21.5T680-270h-40v100h-40v-100H240v100h-40Z"/></svg>
                </button>
            </header>
            <main class="chat-log">
                <!-- 欢迎消息 -->
                <div class="chat-message ai">
                    <div class="message-content">
                        <p>你好！我是你的脉冲助手。告诉我你的计划吧，比如：</p>
                        <ul>
                            <li>“周六下午和朋友喝咖啡”</li>
                            <li>“安排一次为期三天的旅行”</li>
                        </ul>
                    </div>
                </div>
                 <div class="chat-message user">
                    <div class="message-content"><p>这周末和家人去森林公园玩，周六上午10点出发</p></div>
                </div>
                <div class="chat-message ai thinking">
                    <div class="message-content">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 视图2: 时间线视图 -->
        <div id="timeline-view" class="view active">
            <header class="view-header">
                 <div class="participants">
                    <img src="https://via.placeholder.com/30/FFC107/808080?text=A" alt="用户A" class="avatar">
                    <img src="https://via.placeholder.com/30/03A9F4/FFFFFF?text=B" alt="用户B" class="avatar">
                    <img src="https://via.placeholder.com/30/4CAF50/FFFFFF?text=C" alt="用户C" class="avatar">
                </div>
                <h1 class="view-title">周末家庭出游</h1>
                <button id="share-button" class="header-button" title="分享">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3s3-1.34 3-3-1.34-3-3-3z"></path></svg>
                </button>
            </header>
            <main id="timeline-content">
                <!-- 时间线内容会通过JS动态添加 -->
            </main>
        </div>

        <!-- 底部交互输入栏 -->
        <footer id="input-bar">
            <input type="text" id="chat-input" placeholder="输入你的计划...">
            <button id="send-button" title="发送">
                <!-- Icon for send -->
                <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M120-160v-240l320-80-320-80v-240l760 320-760 320Z"/></svg>
            </button>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
