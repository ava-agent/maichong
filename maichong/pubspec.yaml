name: maichong
description: AI-native life rhythm coordination assistant.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.3.6
  riverpod_annotation: ^2.1.1

  # 路由
  go_router: ^13.0.0

  # 代码生成
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.14

  # 网络请求 (Week 2使用)
  dio: ^5.3.2

  # Supabase (Week 2使用)
  supabase_flutter: ^1.10.0

  # AI服务 (Week 3使用) - 暂时注释，Week 3再启用
  # openai_dart: ^0.1.0

  # UI工具
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3

  # 工具库
  intl: ^0.18.0
  uuid: ^4.0.0
  url_launcher: ^6.1.11
  package_info_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

  # Hive 代码生成
  hive_generator: ^2.0.0

  # 代码质量
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
